<!doctype html>
<html lang="es">
  <head>
    <!--
      Anti-FOUC: runs synchronously before the browser paints.
      Reads localStorage and, if no stored preference, checks prefers-color-scheme.
      Must NOT use defer/async — it must block rendering until the class is applied.
    -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (saved === 'dark' || (!saved && prefersDark)) {
            document.documentElement.classList.add('dark');
          }
        } catch (_) {
          // localStorage may be blocked in private mode (Safari) or under strict CSP
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="format-detection" content="telephone=no, email=no, address=no" />
    <meta name="theme-color" content="#2563eb" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>DCM • Gestión de Aportes</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
